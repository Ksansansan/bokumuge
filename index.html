<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ぼくらの無限塔</title>
<style>
  /* === リセット & 全体設定 === */
  * { box-sizing: border-box; user-select: none; }
  body {
    margin: 0; padding: 0; background-color: #050505;
    font-family: 'Times New Roman', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    color: #f2e4c9; display: flex; justify-content: center;
  }
  #game-container {
    width: 100%; max-width: 480px; height: 100dvh;
    background: radial-gradient(circle at center, #261f22 0%, #120e10 100%);
    display: flex; flex-direction: column; position: relative; overflow: hidden;
    border-left: 2px solid #5a4934; border-right: 2px solid #5a4934;
  }

  /* === ヘッダー === */
  header { background: linear-gradient(to bottom, #2b1f18, #140d0a); border-bottom: 2px solid #c49a45; padding: 8px; z-index: 10; }
  .user-info { display: flex; align-items: center; font-size: 14px; margin-bottom: 6px; }
  .username { color: #c49a45; font-weight: bold; margin-right: 10px; }
  .news-ticker { flex-grow: 1; overflow: hidden; background: #000; padding: 2px 5px; border: 1px solid #4a3b26; border-radius: 4px; font-size: 12px; }
  .news-text { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; color: #ffeb85; }
  @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
  .status-bar { display: flex; justify-content: space-between; font-weight: bold; font-family: sans-serif; }
  .stat { background: rgba(0,0,0,0.5); padding: 4px; border-radius: 4px; border: 1px solid #4a3b26; font-size: 13px; width: 23%; text-align: center; }
  .stat span { color: #fff; }

  /* === メインコンテンツ === */
  main { flex-grow: 1; overflow-y: auto; padding: 15px; position: relative; }
  .tab-content { display: none; flex-direction: column; animation: fadeIn 0.3s ease; }
  .tab-content.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  h2 { text-align: center; font-size: 20px; color: #c49a45; margin-top: 0; border-bottom: 1px solid #c49a45; padding-bottom: 5px; }
  .panel { background: rgba(20, 15, 12, 0.8); border: 1px solid #5a4934; border-radius: 6px; padding: 15px; margin-bottom: 15px; }
  
  .btn-fantasy { background: linear-gradient(to bottom, #8a2020, #4a0d0d); border: 2px solid #c49a45; border-radius: 8px; color: #f2e4c9; font-size: 18px; font-weight: bold; font-family: serif; padding: 12px; text-align: center; cursor: pointer; display: block; box-shadow: 0 4px 6px rgba(0,0,0,0.6); }
  .btn-fantasy:active { transform: translateY(2px); }

  .battle-actions { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px; }
  .btn-arrow { background: #2b1f18; border: 2px solid #8c7a65; border-radius: 6px; color: #f2e4c9; font-size: 20px; padding: 10px 15px; cursor: pointer; }
  .btn-arrow.disabled { opacity: 0.3; pointer-events: none; }

  /* === ボトムナビゲーション === */
  nav { background: linear-gradient(to top, #140d0a, #2b1f18); border-top: 2px solid #c49a45; display: flex; z-index: 10; }
  .nav-btn { flex: 1; padding: 12px 0; text-align: center; color: #8c7a65; font-size: 13px; font-weight: bold; cursor: pointer; border-right: 1px solid #4a3b26; font-family: sans-serif; }
  .nav-btn.active { color: #ffdf73; background: rgba(196, 154, 69, 0.1); }
  .nav-icon { display: block; font-size: 18px; margin-bottom: 2px; }

  /* === モーダル === */
  #battle-modal-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; flex-direction: column; }
  .modal-content-battle { width: 90%; max-width: 400px; background: radial-gradient(circle at center, #2b1f18, #140d0a); border: 2px solid #c49a45; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; height: 80vh; }
  #battle-log-container { flex-grow: 1; overflow-y: auto; background: #000; padding: 10px; border: 1px solid #4a3b26; border-radius: 4px; font-size: 12px; color: #ddd; line-height: 1.6; margin-bottom: 15px; }
/* === 新規追加：バトルGUI用CSS === */
  #battle-gui-container {
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(0,0,0,0.6); border: 1px solid #4a3b26; border-radius: 8px;
    padding: 15px 10px; margin-bottom: 10px; position: relative;
  }
  .b-char { width: 42%; text-align: center; }
  .b-name { font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .b-hp-box, .b-gauge-box { width: 100%; background: #222; border: 1px solid #000; border-radius: 4px; overflow: hidden; position: relative; margin-bottom: 4px; }
  .b-hp-box { height: 16px; border-color: #4a3b26; }
  .b-gauge-box { height: 6px; }
  .b-hp-fill { height: 100%; width: 100%; background: #4caf50; transition: width 0.1s linear; }
  .b-hp-fill.enemy-hp-color { background: #f44336; }
  .b-hp-text { position: absolute; top: 0; left: 0; width: 100%; font-size: 11px; line-height: 16px; font-weight: bold; color: #fff; text-shadow: 1px 1px 1px #000; }
  .b-gauge-fill { height: 100%; width: 0%; background: #2196f3; }
  .b-vs { width: 10%; text-align: center; font-weight: bold; color: #c49a45; font-size: 18px; font-style: italic; }

  /* ダメージポップアップ用 */
  .dmg-popup {
    position: absolute; color: #ffeb85; font-size: 20px; font-weight: bold;
    text-shadow: 0 0 4px #ff0000, 1px 1px 2px #000;
    animation: floatUp 0.8s forwards; pointer-events: none; z-index: 10;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    50% { transform: translateY(-20px) scale(1.2); opacity: 1; }
    100% { transform: translateY(-40px) scale(1); opacity: 0; }
  }
</style>
</head>
<body>

<div id="game-container">
  
  <header>
    <div class="user-info">
      <span class="username">たかし</span>
      <div class="news-ticker"><span class="news-text">🔔 ぼくらの無限塔へようこそ！</span></div>
    </div>
    <div class="status-bar">
      <div class="stat" style="color:#ff6b6b;">STR <span id="val-str">0</span></div>
      <div class="stat" style="color:#6be6ff;">VIT <span id="val-vit">0</span></div>
      <div class="stat" style="color:#94ff6b;">AGI <span id="val-agi">0</span></div>
      <div class="stat" style="color:#ffd166;">LCK <span id="val-lck">0</span></div>
    </div>
  </header>

  <main>
    <!-- ⚔️ 1. バトルタブ -->
    <section id="tab-battle" class="tab-content active">
      <h2 id="floor-header">第 1 層</h2>
      <div class="panel" style="text-align: center;">
        <div id="stage-name" style="font-size: 22px; color: #fff; margin-bottom: 5px;"></div>
        <div id="rec-stats" style="font-size: 13px; color: #aaa; margin-bottom: 15px;"></div>
        
        <div style="background: rgba(0,0,0,0.5); border: 1px solid #4a3b26; padding: 10px; border-radius: 4px; margin-bottom: 15px;">
          <div style="color: #ffd166; font-size: 13px; margin-bottom: 5px; font-weight:bold;">🎁 ドロップ情報</div>
          <ul id="drop-list" style="margin: 0; padding-left: 20px; font-size: 12px; color: #ddd; line-height: 1.5; text-align:left;"></ul>
        </div>
      </div>
      
      <div class="battle-actions">
        <button class="btn-arrow disabled">◀</button>
        <button id="btn-challenge" class="btn-fantasy" style="margin: 0; width: 60%; font-size: 22px;">挑戦！</button>
        <button class="btn-arrow disabled">▶</button>
      </div>
    </section>

    <!-- 🏋️ 2. 特訓タブ (ガワのみ) -->
    <section id="tab-training" class="tab-content">
      <h2>特訓場</h2><p style="text-align:center; color:#aaa;">（今後の実装をお楽しみに！）</p>
    </section>

    <!-- 🎒 3. 装備タブ (ガワのみ) -->
    <section id="tab-equip" class="tab-content">
      <h2>武具・ガチャ</h2><p style="text-align:center; color:#aaa;">（今後の実装をお楽しみに！）</p>
    </section>

    <!-- 📖 4. 図鑑タブ (ガワのみ) -->
    <section id="tab-collection" class="tab-content">
      <h2>ドロップ図鑑</h2><p style="text-align:center; color:#aaa;">（今後の実装をお楽しみに！）</p>
    </section>

    <!-- 👑 5. 順位タブ (ガワのみ) -->
    <section id="tab-ranking" class="tab-content">
      <h2>身内ランキング</h2><p style="text-align:center; color:#aaa;">（今後の実装をお楽しみに！）</p>
    </section>
  </main>

  <nav id="bottom-nav">
    <div class="nav-btn active" data-target="tab-battle"><span class="nav-icon">⚔️</span>バトル</div>
    <div class="nav-btn" data-target="tab-training"><span class="nav-icon">🏋️</span>特訓</div>
    <div class="nav-btn" data-target="tab-equip"><span class="nav-icon">🎒</span>装備</div>
    <div class="nav-btn" data-target="tab-collection"><span class="nav-icon">📖</span>図鑑</div>
    <div class="nav-btn" data-target="tab-ranking"><span class="nav-icon">👑</span>順位</div>
  </nav>

  <!-- 🔥 バトル結果表示モーダル -->
  <div id="battle-modal-overlay">
    <div class="modal-content-battle">
      <h3 style="margin-top:0; color:#c49a45; text-align:center; border-bottom:1px solid #c49a45; padding-bottom:10px;">BATTLE</h3>
      
      <!-- 追加：バトルGUI -->
      <div id="battle-gui-container">
        <!-- プレイヤー側 -->
        <div class="b-char player-char">
          <div class="b-name">たかし</div>
          <div class="b-hp-box">
            <div class="b-hp-fill" id="ui-p-hp"></div>
            <div class="b-hp-text" id="ui-p-hp-txt">-- / --</div>
          </div>
          <div class="b-gauge-box">
            <div class="b-gauge-fill" id="ui-p-gauge"></div>
          </div>
        </div>
        
        <div class="b-vs">VS</div>
        
        <!-- 敵側 -->
        <div class="b-char enemy-char">
          <div class="b-name" id="ui-e-name">---</div>
          <div class="b-hp-box">
            <div class="b-hp-fill enemy-hp-color" id="ui-e-hp"></div>
            <div class="b-hp-text" id="ui-e-hp-txt">-- / --</div>
          </div>
          <div class="b-gauge-box">
            <div class="b-gauge-fill" id="ui-e-gauge"></div>
          </div>
        </div>
      </div>

      <!-- ログエリア（少し小さくして残す） -->
      <div id="battle-log-container" style="flex-grow: 1; font-size: 11px; height: 100px;"></div>
      
      <div id="battle-result-text" style="text-align:center; font-size: 20px; font-weight:bold; margin-bottom: 10px; height:25px;"></div>
      <button id="btn-close-battle" class="btn-fantasy" style="margin: 0; width: 100%; font-size: 16px; padding: 10px;">閉じる</button>
    </div>
  </div>

</div>

<!-- ロジックの読み込み -->
<script type="module" src="./src/main.js"></script>

</body>
</html>
